<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Assistant ISI</title>
<style>
  :root {
    --navy: #0a1f3d;
    --blue: #1d5fbf;
    --sky: #5b9bf0;
    --paper: #f6f8fc;
    --panel: #ffffff;
    --ink: #16233d;
    --muted: #5b6b85;
    --line: #dbe4f2;
    --bubble-user: #1d5fbf;
    --bubble-user-ink: #ffffff;
    --bubble-assistant: #eef2fa;
    --error: #a23b28;
    --error-bg: #fbeeec;
    --ok: #1c7a4d;
    --ok-bg: #eaf6ef;
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    display: flex;
    justify-content: center;
  }

  .app-shell {
    width: 100%;
    max-width: 760px;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    box-shadow: 0 0 0 1px var(--line);
  }

  /* ---------- Header ---------- */

  .app-header {
    padding: 28px 28px 0;
  }

  .app-header__row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .app-header__mark {
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    font-size: 28px;
    letter-spacing: 0.01em;
    color: var(--navy);
    margin: 0;
  }

  .app-header__mark span {
    color: var(--blue);
  }

  .app-header__tagline {
    margin: 0 0 20px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--muted);
    font-weight: 600;
  }

  .app-header__status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #b7c2d6;
    flex-shrink: 0;
  }

  .status-dot.is-up { background: var(--ok); }
  .status-dot.is-down { background: var(--error); }

  .header-hairline {
    height: 3px;
    background: linear-gradient(90deg, var(--navy), var(--blue) 55%, var(--sky));
    background-size: 200% 100%;
    animation: hairline-sweep 1.6s ease-out 1;
  }

  @media (prefers-reduced-motion: reduce) {
    .header-hairline { animation: none; }
  }

  @keyframes hairline-sweep {
    from { background-position: 100% 0; }
    to { background-position: 0 0; }
  }

  /* ---------- Upload card ---------- */

  .upload-card {
    margin: 20px 28px 0;
    padding: 16px 18px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--paper);
  }

  .upload-card__label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 10px;
  }

  .upload-card__row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .file-picker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .file-picker input[type="file"] {
    display: none;
  }

  .file-picker__button {
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--navy);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .file-picker__button:hover { border-color: var(--blue); }

  .file-picker__name {
    font-size: 13px;
    color: var(--muted);
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .btn-primary {
    border: none;
    background: var(--blue);
    color: #fff;
    padding: 9px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .btn-primary:hover { background: var(--navy); }

  .btn-primary:disabled {
    background: #aebedb;
    cursor: not-allowed;
  }

  .upload-card__status {
    margin-top: 10px;
    font-size: 13px;
  }

  .upload-card__status.ok { color: var(--ok); }
  .upload-card__status.error { color: var(--error); }
  .upload-card__status.pending { color: var(--muted); }

  /* ---------- Chat ---------- */

  .chat-window {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    margin-top: 8px;
  }

  .chat-log {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .message {
    display: flex;
    flex-direction: column;
    max-width: 82%;
  }

  .message--assistant, .message--error, .message--thinking {
    align-self: flex-start;
  }

  .message--user {
    align-self: flex-end;
    align-items: flex-end;
  }

  .message__bubble {
    padding: 11px 15px;
    border-radius: var(--radius);
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .message--assistant .message__bubble,
  .message--thinking .message__bubble {
    background: var(--bubble-assistant);
    color: var(--ink);
    border-bottom-left-radius: 4px;
  }

  .message--user .message__bubble {
    background: var(--bubble-user);
    color: var(--bubble-user-ink);
    border-bottom-right-radius: 4px;
  }

  .message--error .message__bubble {
    background: var(--error-bg);
    color: var(--error);
    border-bottom-left-radius: 4px;
  }

  .message__sources {
    margin-top: 6px;
    font-size: 11.5px;
    color: var(--muted);
    padding: 0 4px;
    line-height: 1.6;
  }

  .message__sources strong {
    color: var(--muted);
    font-weight: 700;
  }

  /* Thinking indicator */

  .typing {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 2px;
  }

  .typing__dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--blue);
    opacity: 0.35;
    animation: typing-bounce 1.1s ease-in-out infinite;
  }

  .typing__dot:nth-child(2) { animation-delay: 0.15s; }
  .typing__dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes typing-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    .typing__dot { animation: none; opacity: 0.7; }
  }

  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--muted);
    font-size: 13.5px;
    max-width: 320px;
    padding: 24px;
  }

  /* ---------- Composer ---------- */

  .composer {
    display: flex;
    gap: 10px;
    padding: 16px 28px 24px;
    border-top: 1px solid var(--line);
  }

  .composer__input {
    flex: 1;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 11px 18px;
    font-size: 14px;
    font-family: inherit;
    color: var(--ink);
    background: var(--paper);
  }

  .composer__input:focus,
  .file-picker__button:focus-visible,
  .btn-primary:focus-visible,
  .composer__button:focus-visible {
    outline: 2px solid var(--sky);
    outline-offset: 2px;
  }

  .composer__button {
    border: none;
    background: var(--navy);
    color: #fff;
    padding: 0 22px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .composer__button:hover { background: var(--blue); }

  .composer__button:disabled {
    background: #aebedb;
    cursor: not-allowed;
  }

  @media (max-width: 480px) {
    .app-header, .upload-card, .chat-log, .composer {
      padding-left: 16px;
      padding-right: 16px;
    }
    .upload-card { margin-left: 16px; margin-right: 16px; }
  }
</style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-header__row">
        <p class="app-header__mark">I<span>S</span>I</p>
        <span class="app-header__status" id="connection-status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">connexion…</span>
        </span>
      </div>
      <p class="app-header__tagline">Assistant documentaire — Groupe ISI</p>
    </header>
    <div class="header-hairline"></div>

    <section class="upload-card">
      <span class="upload-card__label">Indexer un document</span>
      <div class="upload-card__row">
        <label class="file-picker">
          <span class="file-picker__button">Choisir un PDF</span>
          <input type="file" id="file-input" accept="application/pdf,.pdf" />
        </label>
        <span class="file-picker__name" id="file-name">Aucun fichier choisi</span>
        <button class="btn-primary" id="upload-button" disabled>Indexer</button>
      </div>
      <p class="upload-card__status" id="upload-status"></p>
    </section>

    <main class="chat-window">
      <div class="chat-log" id="chat-log">
        <div class="empty-state" id="empty-state">
          Posez une question sur les formations, campus ou admissions du Groupe ISI —
          ou indexez d'abord un document ci-dessus.
        </div>
      </div>
      <form class="composer" id="composer">
        <input
          class="composer__input"
          id="question-input"
          type="text"
          placeholder="Pose ta question sur le Groupe ISI…"
          autocomplete="off"
        />
        <button class="composer__button" id="send-button" type="submit" disabled>Envoyer</button>
      </form>
    </main>
  </div>

  <script>
    (function () {
      "use strict";

      const chatLog = document.getElementById("chat-log");
      const emptyState = document.getElementById("empty-state");
      const composer = document.getElementById("composer");
      const questionInput = document.getElementById("question-input");
      const sendButton = document.getElementById("send-button");

      const fileInput = document.getElementById("file-input");
      const fileNameLabel = document.getElementById("file-name");
      const uploadButton = document.getElementById("upload-button");
      const uploadStatus = document.getElementById("upload-status");

      const statusDot = document.getElementById("status-dot");
      const statusText = document.getElementById("status-text");

      function extraireDetail(corps, repliDefaut) {
        if (!corps || corps.detail === undefined) return repliDefaut;
        const detail = corps.detail;
        if (typeof detail === "string") return detail;
        if (Array.isArray(detail)) {
          return detail
            .map((item) => (item && item.msg) ? item.msg : JSON.stringify(item))
            .join(" ");
        }
        return repliDefaut;
      }

      async function verifierSante() {
        try {
          const reponse = await fetch("/health");
          const corps = await reponse.json();
          const enLigne = corps.status === "ok";
          statusDot.classList.toggle("is-up", enLigne);
          statusDot.classList.toggle("is-down", !enLigne);
          const provider = corps.llm && corps.llm.provider ? corps.llm.provider : "?";
          statusText.textContent = enLigne ? `en ligne · ${provider}` : "service degrade";
        } catch (erreur) {
          statusDot.classList.add("is-down");
          statusText.textContent = "hors ligne";
        }
      }

      function creerMessage(role) {
        const message = document.createElement("div");
        message.className = "message message--" + role;
        const bulle = document.createElement("div");
        bulle.className = "message__bubble";
        message.appendChild(bulle);
        return { message, bulle };
      }

      function ajouterAuJournal(element) {
        if (emptyState.parentNode) emptyState.remove();
        chatLog.appendChild(element);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      function afficherMessageUtilisateur(texte) {
        const { message, bulle } = creerMessage("user");
        bulle.textContent = texte;
        ajouterAuJournal(message);
      }

      function afficherIndicateurDeSaisie() {
        const { message, bulle } = creerMessage("thinking");
        const typing = document.createElement("span");
        typing.className = "typing";
        for (let i = 0; i < 3; i++) {
          const dot = document.createElement("span");
          dot.className = "typing__dot";
          typing.appendChild(dot);
        }
        bulle.appendChild(typing);
        ajouterAuJournal(message);
        return message;
      }

      function formaterSource(source) {
        const page = (source.numero_page !== null && source.numero_page !== undefined)
          ? `p. ${source.numero_page}`
          : "page inconnue";
        const distance = (typeof source.distance === "number") ? source.distance.toFixed(2) : source.distance;
        return `${source.document} (${page}, distance ${distance})`;
      }

      function remplacerParReponse(placeholder, corps) {
        const { message, bulle } = creerMessage("assistant");
        bulle.textContent = corps.reponse;
        message.appendChild(bulle);

        if (Array.isArray(corps.sources) && corps.sources.length > 0) {
          const sources = document.createElement("div");
          sources.className = "message__sources";
          const label = document.createElement("strong");
          label.textContent = "Sources : ";
          sources.appendChild(label);
          sources.appendChild(document.createTextNode(corps.sources.map(formaterSource).join(" · ")));
          message.appendChild(sources);
        }

        const meta = document.createElement("div");
        meta.className = "message__sources";
        meta.textContent = `Répondu en ${corps.temps_ms} ms`;
        message.appendChild(meta);

        placeholder.replaceWith(message);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      function remplacerParErreur(placeholder, texte) {
        const { message, bulle } = creerMessage("error");
        bulle.textContent = texte;
        placeholder.replaceWith(message);
        chatLog.scrollTop = chatLog.scrollHeight;
      }

      async function envoyerQuestion(question) {
        afficherMessageUtilisateur(question);
        const placeholder = afficherIndicateurDeSaisie();

        questionInput.disabled = true;
        sendButton.disabled = true;

        try {
          const reponse = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: question }),
          });
          const corps = await reponse.json();

          if (!reponse.ok) {
            remplacerParErreur(
              placeholder,
              extraireDetail(corps, `Erreur ${reponse.status} : la question n'a pas pu être traitée.`)
            );
          } else {
            remplacerParReponse(placeholder, corps);
          }
        } catch (erreur) {
          remplacerParErreur(placeholder, "Impossible de contacter le serveur. Vérifiez que l'API est lancée.");
        } finally {
          questionInput.disabled = false;
          sendButton.disabled = questionInput.value.trim().length === 0;
          questionInput.focus();
        }
      }

      composer.addEventListener("submit", function (evenement) {
        evenement.preventDefault();
        const question = questionInput.value.trim();
        if (!question) return;
        questionInput.value = "";
        sendButton.disabled = true;
        envoyerQuestion(question);
      });

      questionInput.addEventListener("input", function () {
        sendButton.disabled = questionInput.value.trim().length === 0;
      });

      fileInput.addEventListener("change", function () {
        const fichier = fileInput.files[0];
        fileNameLabel.textContent = fichier ? fichier.name : "Aucun fichier choisi";
        uploadButton.disabled = !fichier;
        uploadStatus.textContent = "";
        uploadStatus.className = "upload-card__status";
      });

      uploadButton.addEventListener("click", async function () {
        const fichier = fileInput.files[0];
        if (!fichier) return;

        uploadButton.disabled = true;
        fileInput.disabled = true;
        uploadStatus.className = "upload-card__status pending";
        uploadStatus.textContent = "Indexation en cours… (extraction, embeddings, stockage)";

        const donnees = new FormData();
        donnees.append("file", fichier);

        try {
          const reponse = await fetch("/documents/upload", {
            method: "POST",
            body: donnees,
          });
          const corps = await reponse.json();

          if (!reponse.ok) {
            uploadStatus.className = "upload-card__status error";
            uploadStatus.textContent = extraireDetail(
              corps,
              `Erreur ${reponse.status} : le document n'a pas pu être indexé.`
            );
          } else {
            uploadStatus.className = "upload-card__status ok";
            uploadStatus.textContent =
              `${corps.nb_chunks} chunk(s) créés pour « ${corps.nom_fichier} ». Vous pouvez poser vos questions.`;
            fileInput.value = "";
            fileNameLabel.textContent = "Aucun fichier choisi";
          }
        } catch (erreur) {
          uploadStatus.className = "upload-card__status error";
          uploadStatus.textContent = "Impossible de contacter le serveur. Vérifiez que l'API est lancée.";
        } finally {
          fileInput.disabled = false;
          uploadButton.disabled = !fileInput.files[0];
        }
      });

      verifierSante();
    })();
  </script>
</body>
</html>
